name: Generate Podcast Feed

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        show: [social-psychology, intro-vt, personal, personlighedspsykologi-en, bioneuro]
    env:
      SERVICE_ACCOUNT_JSON_DEFAULT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      SERVICE_ACCOUNT_JSON_SOCIAL_PSYCHOLOGY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_SOCIAL_PSYCHOLOGY }}
      SERVICE_ACCOUNT_JSON_INTRO_VT: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_INTRO_VT }}
      SERVICE_ACCOUNT_JSON_BERLINGSKE: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON_BERLINGSKE }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      # TTS feeds temporarily disabled
      DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
      DRIVE_FOLDER_ID_SOCIAL_PSYCHOLOGY: ${{ secrets.DRIVE_FOLDER_ID_SOCIAL_PSYCHOLOGY }}
      DRIVE_FOLDER_ID_INTRO_VT: ${{ secrets.DRIVE_FOLDER_ID_INTRO_VT }}
      DRIVE_FOLDER_ID_BERLINGSKE: ${{ secrets.DRIVE_FOLDER_ID_BERLINGSKE }}
      # DRIVE_FOLDER_ID_INTRO_VT_TSS / DRIVE_FOLDER_ID_SOCIAL_PSYCHOLOGY_TTS not required while TTS feeds paused
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve show config policy
        id: show_policy
        env:
          SHOW: ${{ matrix.show }}
        run: |
          python3 podcast-tools/show_config_policy.py \
            resolve \
            --config "shows/${SHOW}/config.github.json" \
            --github-output "$GITHUB_OUTPUT"

      - name: Resolve show source import
        id: source_import
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          show = os.environ["SHOW"]
          config_path = Path(f"shows/{show}/config.github.json")
          data = json.loads(config_path.read_text(encoding="utf-8"))
          source_import = data.get("source_import") if isinstance(data.get("source_import"), dict) else {}
          storage = data.get("storage") if isinstance(data.get("storage"), dict) else {}

          enabled = bool(source_import.get("enabled"))
          provider = str(source_import.get("provider") or "").strip() if enabled else ""
          restrict_to_inventory = bool(source_import.get("restrict_to_current_inventory")) if enabled else False
          if enabled and provider not in {"drive"}:
              raise SystemExit(f"Unsupported source_import.provider for {show}: {provider}")

          values = {
              "enabled": "true" if enabled else "false",
              "provider": provider,
              "restrict_to_current_inventory": "true" if restrict_to_inventory else "false",
              "storage_bucket": str(storage.get("bucket") or "").strip(),
              "storage_endpoint": str(storage.get("endpoint") or "").strip(),
              "storage_region": str(storage.get("region") or "").strip(),
              "storage_prefix": str(storage.get("prefix") or "").strip(),
              "storage_public_base_url": str(storage.get("public_base_url") or "").strip(),
              "storage_manifest_file": str(storage.get("manifest_file") or "").strip(),
          }

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              for key, value in values.items():
                  handle.write(f"{key}={value}\n")
          PY

      - name: Skip queue-owned writer path
        if: steps.show_policy.outputs.workflow_writer_enabled != 'true'
        env:
          SHOW: ${{ matrix.show }}
          PUBLICATION_OWNER: ${{ steps.show_policy.outputs.publication_owner }}
        run: |
          echo "Show ${SHOW} is publication.owner=${PUBLICATION_OWNER}; skipping legacy workflow writer path."

      - name: Check required secrets
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
          STORAGE_PROVIDER: ${{ steps.show_policy.outputs.storage_provider }}
          SOURCE_IMPORT_PROVIDER: ${{ steps.source_import.outputs.provider }}
        run: |
          if [[ "${STORAGE_PROVIDER}" == "drive" || "${SOURCE_IMPORT_PROVIDER}" == "drive" ]]; then
            show_upper=${SHOW^^}
            show_upper=${show_upper//-/_}
            show_key="SERVICE_ACCOUNT_JSON_${show_upper}"
            show_secret=${!show_key}

            if [[ -z "${show_secret}" && -z "${SERVICE_ACCOUNT_JSON_DEFAULT}" ]]; then
              echo "Missing service account secret: set ${show_key} or GOOGLE_SERVICE_ACCOUNT_JSON." >&2
              exit 1
            fi
          elif [[ "${STORAGE_PROVIDER}" == "r2" ]]; then
            if [[ -z "${R2_ACCESS_KEY_ID}" || -z "${R2_SECRET_ACCESS_KEY}" ]]; then
              echo "Missing R2 credentials: set R2_ACCESS_KEY_ID and R2_SECRET_ACCESS_KEY." >&2
              exit 1
            fi
          else
            echo "Unsupported storage provider: ${STORAGE_PROVIDER}" >&2
            exit 1
          fi

      - name: Set up Python
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        run: pip install -r requirements.txt

      - name: Write service account credentials
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && (steps.show_policy.outputs.storage_provider == 'drive' || steps.source_import.outputs.provider == 'drive')
        env:
          SHOW: ${{ matrix.show }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          show = os.environ["SHOW"]
          show_upper = show.upper().replace('-', '_')
          secret_key = f"SERVICE_ACCOUNT_JSON_{show_upper}"
          creds = os.environ.get(secret_key) or os.environ.get("SERVICE_ACCOUNT_JSON_DEFAULT")
          if not creds:
              raise SystemExit(
                  f"Missing service account credentials: define secret '{secret_key}' or 'GOOGLE_SERVICE_ACCOUNT_JSON'."
              )
          dest = Path(f"shows/{show}/service-account.json")
          dest.parent.mkdir(parents=True, exist_ok=True)
          dest.write_text(creds)
          PY

      - name: Prepare runtime config
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
          STORAGE_PROVIDER: ${{ steps.show_policy.outputs.storage_provider }}
          SOURCE_IMPORT_PROVIDER: ${{ steps.source_import.outputs.provider }}
        run: |
          python3 <<'PY'
          import json
          import os
          from pathlib import Path

          show = os.environ["SHOW"]
          provider = os.environ["STORAGE_PROVIDER"]
          source_import_provider = os.environ.get("SOURCE_IMPORT_PROVIDER") or ""
          show_upper = show.upper().replace('-', '_')
          source_path = Path(f"shows/{show}/config.github.json")
          output_path = Path(f"shows/{show}/config.runtime.json")

          with source_path.open("r", encoding="utf-8") as fh:
              data = json.load(fh)

          if provider == "drive" or source_import_provider == "drive":
              secret_key = f"DRIVE_FOLDER_ID_{show_upper}"
              drive_id = os.environ.get(secret_key)
              fallback_drive_id = os.environ.get("DRIVE_FOLDER_ID")

              placeholder = "__DRIVE_FOLDER_ID__"
              existing_id = str(data.get("drive_folder_id", ""))

              if drive_id:
                  data["drive_folder_id"] = drive_id
              elif placeholder in existing_id:
                  if fallback_drive_id:
                      data["drive_folder_id"] = fallback_drive_id
                  else:
                      raise RuntimeError(
                          f"Drive folder ID placeholder found in {source_path}; set secret '{secret_key}' or 'DRIVE_FOLDER_ID'."
                      )
              elif fallback_drive_id and existing_id == "":
                  data["drive_folder_id"] = fallback_drive_id

              data["service_account_file"] = f"shows/{show}/service-account.json"

          output_path.write_text(json.dumps(data, indent=2))
          PY

      - name: Import Drive media to R2
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && steps.show_policy.outputs.storage_provider == 'r2' && steps.source_import.outputs.enabled == 'true' && steps.source_import.outputs.provider == 'drive'
        env:
          SHOW: ${{ matrix.show }}
          STORAGE_BUCKET: ${{ steps.source_import.outputs.storage_bucket }}
          STORAGE_ENDPOINT: ${{ steps.source_import.outputs.storage_endpoint }}
          STORAGE_REGION: ${{ steps.source_import.outputs.storage_region }}
          STORAGE_PREFIX: ${{ steps.source_import.outputs.storage_prefix }}
          STORAGE_PUBLIC_BASE_URL: ${{ steps.source_import.outputs.storage_public_base_url }}
          STORAGE_MANIFEST_FILE: ${{ steps.source_import.outputs.storage_manifest_file }}
          RESTRICT_TO_CURRENT_INVENTORY: ${{ steps.source_import.outputs.restrict_to_current_inventory }}
        run: |
          if [[ -z "${STORAGE_BUCKET}" || -z "${STORAGE_ENDPOINT}" || -z "${STORAGE_PREFIX}" || -z "${STORAGE_PUBLIC_BASE_URL}" || -z "${STORAGE_MANIFEST_FILE}" ]]; then
            echo "::error::Incomplete R2 storage config for Drive source import on ${SHOW}."
            exit 1
          fi
          cmd=(
            python scripts/migrate_drive_show_to_r2.py
            --config "shows/${SHOW}/config.runtime.json"
            --source-config "shows/${SHOW}/config.runtime.json"
            --bucket "${STORAGE_BUCKET}"
            --endpoint "${STORAGE_ENDPOINT}"
            --region "${STORAGE_REGION}"
            --prefix "${STORAGE_PREFIX}"
            --public-base-url "${STORAGE_PUBLIC_BASE_URL}"
            --manifest-path "${STORAGE_MANIFEST_FILE}"
          )
          if [[ "${RESTRICT_TO_CURRENT_INVENTORY}" == "true" ]]; then
            cmd+=(--restrict-to-current-inventory)
          fi
          "${cmd[@]}"

      - name: Check Drive for videos needing transcode
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && steps.show_policy.outputs.storage_provider == 'drive'
        id: probe_transcode
        env:
          SHOW: ${{ matrix.show }}
        run: |
          python podcast-tools/transcode_drive_media.py \
            --config shows/${SHOW}/config.runtime.json \
            --check-only \
            --github-output "$GITHUB_OUTPUT"

      - name: Install ffmpeg
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && steps.show_policy.outputs.storage_provider == 'drive' && steps.probe_transcode.outputs.needs_transcode == 'true'
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Transcode Drive media
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && steps.show_policy.outputs.storage_provider == 'drive' && steps.probe_transcode.outputs.needs_transcode == 'true'
        env:
          SHOW: ${{ matrix.show }}
        run: python podcast-tools/transcode_drive_media.py --config shows/${SHOW}/config.runtime.json

      - name: Trust droplet host key
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && contains(fromJSON('["personlighedspsykologi-en","bioneuro"]'), matrix.show)
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H 64.226.79.109 >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Sync quiz links
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && contains(fromJSON('["personlighedspsykologi-en","bioneuro"]'), matrix.show)
        env:
          SHOW: ${{ matrix.show }}
          STORAGE_PROVIDER: ${{ steps.show_policy.outputs.storage_provider }}
          DROPLET_SSH_KEY: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
        run: |
          case "${SHOW}" in
            personlighedspsykologi-en)
              subject_slug="personlighedspsykologi"
              flat_id_include_subject=""
              remote_root="/var/www/quizzes/personlighedspsykologi"
              output_root="notebooklm-podcast-auto/personlighedspsykologi/output"
              ;;
            bioneuro)
              subject_slug="bioneuro"
              flat_id_include_subject="--flat-id-include-subject"
              remote_root="/var/www/quizzes/bioneuro"
              output_root="notebooklm-podcast-auto/bioneuro/output"
              ;;
            *)
              echo "::error::Unexpected show for quiz sync: ${SHOW}"
              exit 1
              ;;
          esac
          if [[ -z "${DROPLET_SSH_KEY}" ]]; then
            echo "::error::DIGITALOCEAN_SSH_KEY not set; cannot sync quizzes for ${SHOW}."
            exit 1
          fi

          key_path="${RUNNER_TEMP}/droplet_key"
          echo "${DROPLET_SSH_KEY}" > "${key_path}"
          chmod 600 "${key_path}"

          if [[ "${STORAGE_PROVIDER}" == "drive" ]]; then
            download_root="${RUNNER_TEMP}/drive-quizzes/${subject_slug}"
            cmd=(
              python podcast-tools/sync_drive_quiz_links.py
              --config "shows/${SHOW}/config.runtime.json"
              --download-root "${download_root}"
              --subject-slug "${subject_slug}"
              --language-tag "[EN]"
              --quiz-path-mode flat-id
              --flat-id-len 8
              --quiz-difficulty any
              --fallback-derive-mp3-names
              --preferred-audio-inventory "shows/${SHOW}/episode_inventory.json"
              --remote-root "${remote_root}"
            )
            if [[ -n "${flat_id_include_subject}" ]]; then
              cmd+=("${flat_id_include_subject}")
            fi
            "${cmd[@]}" --upload --ssh-key "${key_path}"
            local_probe_root="${download_root}"
          else
            cmd=(
              python scripts/sync_quiz_links.py
              --output-root "${output_root}"
              --links-file "shows/${SHOW}/quiz_links.json"
              --subject-slug "${subject_slug}"
              --language-tag "[EN]"
              --quiz-path-mode flat-id
              --flat-id-len 8
              --quiz-difficulty any
              --fallback-derive-mp3-names
              --preferred-audio-inventory "shows/${SHOW}/episode_inventory.json"
              --remote-root "${remote_root}"
              --ssh-key "${key_path}"
            )
            if [[ -n "${flat_id_include_subject}" ]]; then
              cmd+=("${flat_id_include_subject}")
            fi
            "${cmd[@]}"
            local_probe_root="${output_root}"
          fi

          local_json_count="$(find "${local_probe_root}" -type f -name '*.json' | wc -l | tr -d '[:space:]')"
          if [[ "${local_json_count}" -le 0 ]]; then
            echo "::error::No quiz JSON files downloaded for ${SHOW}; aborting."
            exit 1
          fi
          sample_json="$(find "${local_probe_root}" -type f -name '*.json' -print -quit)"
          if [[ -z "${sample_json}" ]]; then
            echo "::error::Unable to select sample quiz file for ${SHOW}; aborting."
            exit 1
          fi
          sample_base="$(basename "${sample_json}")"
          remote_json_count="$(ssh -i "${key_path}" "root@64.226.79.109" "find '${remote_root}' -type f -name '*.json' | wc -l" | tr -d '[:space:]')"
          if [[ "${remote_json_count}" -lt "${local_json_count}" ]]; then
            echo "::error::Remote quiz JSON count (${remote_json_count}) is lower than local count (${local_json_count}) for ${SHOW}."
            exit 1
          fi
          ssh -i "${key_path}" "root@64.226.79.109" "test -f '${remote_root}/${sample_base}'"

      - name: Generate feed
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
        run: python podcast-tools/gdrive_podcast_feed.py --config shows/${SHOW}/config.runtime.json

      - name: Validate regeneration inventory
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && matrix.show == 'personlighedspsykologi-en'
        run: python scripts/validate_regeneration_inventory.py --show-slug personlighedspsykologi-en

      - name: Audit lecture slide brief coverage
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && matrix.show == 'personlighedspsykologi-en'
        run: python scripts/audit_personlighedspsykologi_slide_briefs.py --warn-only

      - name: Sync Spotify map
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && contains(fromJSON('["personlighedspsykologi-en","bioneuro"]'), matrix.show)
        env:
          SHOW: ${{ matrix.show }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
        run: |
          if [[ -z "${SPOTIFY_CLIENT_ID}" || -z "${SPOTIFY_CLIENT_SECRET}" ]]; then
            echo "::error::SPOTIFY_CLIENT_ID and SPOTIFY_CLIENT_SECRET are required for direct Spotify episode mapping."
            exit 1
          fi
          case "${SHOW}" in
            personlighedspsykologi-en)
              subject_slug="personlighedspsykologi"
              spotify_show_url="https://open.spotify.com/show/0jAvkPCcZ1x98lIMno1oqv"
              ;;
            bioneuro)
              subject_slug="bioneuro"
              spotify_show_url="https://open.spotify.com/show/5QIHRkc1N6xuCqtnfmsPfN"
              ;;
            *)
              echo "::error::Unexpected show for Spotify sync: ${SHOW}"
              exit 1
              ;;
          esac
          python scripts/sync_spotify_map.py \
            --inventory shows/${SHOW}/episode_inventory.json \
            --spotify-map shows/${SHOW}/spotify_map.json \
            --subject-slug "${subject_slug}" \
            --spotify-show-url "${spotify_show_url}" \
            --spotify-market DK \
            --prune-stale \
            --allow-unresolved

      - name: Rebuild subject content manifest
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && contains(fromJSON('["personlighedspsykologi-en","bioneuro"]'), matrix.show)
        env:
          SHOW: ${{ matrix.show }}
        run: |
          case "${SHOW}" in
            personlighedspsykologi-en) subject_slug="personlighedspsykologi" ;;
            bioneuro) subject_slug="bioneuro" ;;
            *)
              echo "::error::Unexpected show for manifest rebuild: ${SHOW}"
              exit 1
              ;;
          esac
          python freudd_portal/manage.py rebuild_content_manifest --subject "${subject_slug}"

      - name: Validate quiz coverage
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true' && contains(fromJSON('["personlighedspsykologi-en","bioneuro"]'), matrix.show)
        env:
          SHOW: ${{ matrix.show }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          show = os.environ["SHOW"]
          quiz_path = Path(f"shows/{show}/quiz_links.json")
          manifest_path = Path(f"shows/{show}/content_manifest.json")

          if not quiz_path.exists():
              raise SystemExit(f"Missing quiz links file: {quiz_path}")
          if not manifest_path.exists():
              raise SystemExit(f"Missing content manifest file: {manifest_path}")

          quiz_payload = json.loads(quiz_path.read_text(encoding="utf-8"))
          by_name = quiz_payload.get("by_name") if isinstance(quiz_payload, dict) else None
          if not isinstance(by_name, dict) or not by_name:
              raise SystemExit(f"quiz_links.by_name is empty for {show}")

          manifest_payload = json.loads(manifest_path.read_text(encoding="utf-8"))
          lectures = manifest_payload.get("lectures") if isinstance(manifest_payload, dict) else []
          quiz_assets = 0
          if isinstance(lectures, list):
              for lecture in lectures:
                  if not isinstance(lecture, dict):
                      continue
                  lecture_assets = lecture.get("lecture_assets") if isinstance(lecture.get("lecture_assets"), dict) else {}
                  quiz_assets += len(lecture_assets.get("quizzes") or [])
                  readings = lecture.get("readings") if isinstance(lecture.get("readings"), list) else []
                  for reading in readings:
                      if not isinstance(reading, dict):
                          continue
                      assets = reading.get("assets") if isinstance(reading.get("assets"), dict) else {}
                      quiz_assets += len(assets.get("quizzes") or [])

          if quiz_assets <= 0:
              raise SystemExit(f"Manifest has zero quiz assets for {show}")

          print(f"Validated {show}: by_name={len(by_name)} quiz_assets={quiz_assets}")
          PY

      - name: Commit updated feed
        if: steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
          MANIFEST_PATH: ${{ steps.source_import.outputs.storage_manifest_file }}
        run: |
          set -euo pipefail
          feed_path="shows/${SHOW}/feeds/rss.xml"
          inventory_path="shows/${SHOW}/episode_inventory.json"
          quiz_path="shows/${SHOW}/quiz_links.json"
          spotify_map_path="shows/${SHOW}/spotify_map.json"
          manifest_path="shows/${SHOW}/content_manifest.json"
          media_manifest_path="${MANIFEST_PATH}"
          safe_rebase_paths=("$feed_path" "$inventory_path" "$quiz_path" "$spotify_map_path" "$manifest_path")
          if [[ -n "${media_manifest_path}" ]]; then
            safe_rebase_paths+=("${media_manifest_path}")
          fi

          resolve_rebase_conflicts() {
            mapfile -t conflicted_files < <(git diff --name-only --diff-filter=U)
            if [[ ${#conflicted_files[@]} -eq 0 ]]; then
              echo "::error::Rebase failed without conflicted files."
              git rebase --abort || true
              return 1
            fi

            for conflicted in "${conflicted_files[@]}"; do
              keep_ours=0
              for safe_path in "${safe_rebase_paths[@]}"; do
                if [[ "${conflicted}" == "${safe_path}" ]]; then
                  keep_ours=1
                  break
                fi
              done
              if [[ "${keep_ours}" == "1" ]]; then
                git checkout --ours -- "${conflicted}"
                git add "${conflicted}"
              else
                echo "::error::Unexpected rebase conflict in ${conflicted}"
                git rebase --abort || true
                return 1
              fi
            done

            GIT_EDITOR=true git rebase --continue
          }

          files=()
          if [[ -n "$(git status --porcelain "$feed_path")" ]]; then
            files+=("$feed_path")
          fi
          if [[ -f "$inventory_path" && -n "$(git status --porcelain "$inventory_path")" ]]; then
            files+=("$inventory_path")
          fi
          if [[ -f "$quiz_path" && -n "$(git status --porcelain "$quiz_path")" ]]; then
            files+=("$quiz_path")
          fi
          if [[ -f "$spotify_map_path" && -n "$(git status --porcelain "$spotify_map_path")" ]]; then
            files+=("$spotify_map_path")
          fi
          if [[ -f "$manifest_path" && -n "$(git status --porcelain "$manifest_path")" ]]; then
            files+=("$manifest_path")
          fi
          if [[ -n "$media_manifest_path" && -f "$media_manifest_path" && -n "$(git status --porcelain "$media_manifest_path")" ]]; then
            files+=("$media_manifest_path")
          fi
          if [[ ${#files[@]} -gt 0 ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "${files[@]}"
            git commit -m "chore: update ${SHOW} podcast feed"
            branch="${GITHUB_REF#refs/heads/}"
            max_attempts=3
            attempt=1
            while [[ "${attempt}" -le "${max_attempts}" ]]; do
              if ! git pull --rebase origin "$branch"; then
                echo "Rebase conflict on attempt ${attempt}; resolving allowed generated-file conflicts."
                resolve_rebase_conflicts
              fi

              if git push origin HEAD:"$branch"; then
                echo "Push succeeded on attempt ${attempt}."
                break
              fi

              if [[ "${attempt}" -eq "${max_attempts}" ]]; then
                echo "::error::Failed to push updated feed after ${max_attempts} attempts."
                exit 1
              fi

              echo "Push rejected on attempt ${attempt}; retrying after refetch."
              git fetch origin "$branch"
              attempt=$((attempt + 1))
            done
          else
            echo "No changes to commit for ${SHOW}"
          fi

      - name: Cleanup secrets
        if: always() && steps.show_policy.outputs.workflow_writer_enabled == 'true'
        env:
          SHOW: ${{ matrix.show }}
        run: rm -f shows/${SHOW}/service-account.json shows/${SHOW}/config.runtime.json
